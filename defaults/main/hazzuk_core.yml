---

hazzuk_core:
  - traefik
  - pocketid

# pocketid

hazzuk_core_pocketid_enabled: false

hazzuk_core_pocketid_stack_defaults:
  pocketid:
    image: ghcr.io/pocket-id/pocket-id
    version: v2.6.2@sha256:1cc51e5b36fa7ec31368d3efb24ba362be6dce20f3cc0a2852843527bd5110f0
    log_level: info # debug, info, warn, error
    encryption_key: "" # `openssl rand -base64 32`
    maxmind_license_key: ""

hazzuk_core_pocketid_secrets:
  # required
  pocketid_encryption_key: "{{ hazzuk_core_pocketid_stack.pocketid.encryption_key }}"
  # optional
  pocketid_maxmind_license_key: "{{ hazzuk_core_pocketid_stack.pocketid.maxmind_license_key | default('') }}"

# traefik

hazzuk_core_traefik_enabled: false

hazzuk_core_traefik_stack_defaults:
  traefik:
    image: docker.io/traefik
    version: v3.6.15@sha256:8cb20d16e01a53d8d7f7696ac2f1af7d200d5c9984d226ce2299731d9eab6d6c
    log_level: debug # trace, debug, info, warn, error, fatal, panic
    acme:
      staging_enabled: true
      email: cert@example.com
      staging_ca_server_url: "https://acme-staging-v02.api.letsencrypt.org/directory"
      live_ca_server_url: "https://acme-v02.api.letsencrypt.org/directory" # "https://acme.zerossl.com/v2/DV90"
      zone_api_token: ""
      dns_api_token: ""
    dashboard:
      enabled: true
      forward_auth_enabled: true
      domain: "traefik.{{ karo_compose_root_domain }}"
    custom_domains_raw: |
      # - main: "*.int.{{ karo_compose_root_domain }}"
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth
    version: v5.0.7-distroless@sha256:e31ae2bac566cfe4687a8a54121a884ce25c4869995075f8e7e3d352bcd59241
    domain: "tinyauth.{{ karo_compose_root_domain }}"
    log_level: info # trace, debug, info, warn, error, fatal, panic
    oidc:
      client_id: ""
      client_secret: ""
  cetusguard:
    image: docker.io/hectorm/cetusguard
    version: v1.1.3@sha256:b3dc5d2042869dd714c75985d94bb8c259df53b325ec6b1a2b57bcc3eac17689
    log_level: 7 # 0-7 (min to max verbosity)

hazzuk_core_traefik_secrets:
  traefik_acme_zone_api_token: "{{ hazzuk_core_traefik_stack.traefik.acme.zone_api_token }}"
  traefik_acme_dns_api_token: "{{ hazzuk_core_traefik_stack.traefik.acme.dns_api_token }}"
  tinyauth_oidc_client_secret: "{{ hazzuk_core_traefik_stack.tinyauth.oidc.client_secret }}"
